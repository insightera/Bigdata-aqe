# Data Lakehouse AQE — Docker Compose
# Override port host lewat file .env (lihat .env.example, prefix LHAQE_*).
#
# Stack: MinIO | Hive Metastore | Iceberg REST | Spark | Airflow | Trino
#        Superset | Prometheus | Grafana | Jupyter
# Tidak termasuk: Atlas, HBase, Solr, Kafka, ZooKeeper, Data Catalog (metadata lama).

networks:
  lakehouse-net:
    driver: bridge

volumes:
  minio-data:
  postgres-data:
  hive-warehouse:
  prometheus-data:
  grafana-data:
  superset-home:

x-airflow-common-env: &airflow-common-env
  AIRFLOW__CORE__EXECUTOR: LocalExecutor
  AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://admin:admin123@postgres:5432/airflow_db
  AIRFLOW__CORE__LOAD_EXAMPLES: "false"
  AIRFLOW__CORE__FERNET_KEY: "81HqDtbqAywKSOumSha3BhWNOdQ26slT6K0YaZeZyPs="
  AIRFLOW__WEBSERVER__SECRET_KEY: "lakehouse_secret_key_2024"
  PYTHONPATH: "/opt/airflow/scripts"
  PYSPARK_PYTHON: python3
  PYSPARK_DRIVER_PYTHON: python3
  AIRFLOW__SCHEDULER__ZOMBIE_TASK_THRESHOLD: "3600"
  AIRFLOW__SCHEDULER__TASK_INSTANCE_HEARTBEAT_TIMEOUT: "3600"
  SPARK_EXECUTOR_INSTANCES: "2"
  SPARK_EXECUTOR_MEMORY: "2g"
  SPARK_DRIVER_MEMORY: "2g"
  AIRFLOW__SCHEDULER__TASK_QUEUED_TIMEOUT: "600"
  SPARK_MASTER: "spark://spark-master:7077"
  SPARK_AQE_SCENARIO: "${SPARK_AQE_SCENARIO:-OFF}"
  AQE_METRICS_DIR: "/opt/airflow/metrics"

services:

  # ─────────────────────────────────────────────
  # POSTGRESQL
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: lhaqe-postgres
    hostname: postgres
    networks: [lakehouse-net]
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin123
      POSTGRES_DB: metastore_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d metastore_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${LHAQE_POSTGRES_PORT:-15432}:5432"

  # ─────────────────────────────────────────────
  # MINIO
  # ─────────────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: lhaqe-minio
    hostname: minio
    networks: [lakehouse-net]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio-data:/data
    ports:
      - "${LHAQE_MINIO_API_PORT:-19000}:9000"
      - "${LHAQE_MINIO_CONSOLE_PORT:-19001}:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: lhaqe-minio-init
    networks: [lakehouse-net]
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin123;
        mc mb --ignore-existing local/staging;
        mc mb --ignore-existing local/bronze;
        mc mb --ignore-existing local/silver;
        mc mb --ignore-existing local/gold;
        mc mb --ignore-existing local/warehouse;
        mc mb --ignore-existing local/airflow-logs;
        mc mb --ignore-existing local/spark-event-logs;
        echo 'MinIO buckets ready';
      "
    restart: "no"

  # ─────────────────────────────────────────────
  # ICEBERG REST CATALOG
  # ─────────────────────────────────────────────
  iceberg-rest:
    image: tabulario/iceberg-rest:1.5.0
    container_name: lhaqe-iceberg-rest
    hostname: iceberg-rest
    networks: [lakehouse-net]
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      CATALOG_CATALOG__IMPL: org.apache.iceberg.jdbc.JdbcCatalog
      CATALOG_URI: jdbc:postgresql://postgres:5432/iceberg_catalog
      CATALOG_JDBC_USER: admin
      CATALOG_JDBC_PASSWORD: admin123
      CATALOG_WAREHOUSE: s3://warehouse/
      CATALOG_IO__IMPL: org.apache.iceberg.aws.s3.S3FileIO
      CATALOG_S3_ENDPOINT: http://minio:9000
      CATALOG_S3_PATH__STYLE__ACCESS: "true"
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
    ports:
      - "${LHAQE_ICEBERG_REST_PORT:-18181}:8181"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8181'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ─────────────────────────────────────────────
  # HIVE METASTORE
  # ─────────────────────────────────────────────
  hive-metastore:
    image: apache/hive:4.0.0
    container_name: lhaqe-hive-metastore
    hostname: hive-metastore
    networks: [lakehouse-net]
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SKIP_SCHEMA_INIT: "false"
      SERVICE_OPTS: >-
        -Djavax.jdo.option.ConnectionDriverName=org.postgresql.Driver
        -Djavax.jdo.option.ConnectionURL=jdbc:postgresql://postgres:5432/metastore_db
        -Djavax.jdo.option.ConnectionUserName=admin
        -Djavax.jdo.option.ConnectionPassword=admin123
    volumes:
      - hive-warehouse:/opt/hive/data/warehouse
      - ./conf/hive-site.xml:/opt/hive/conf/hive-site.xml
      - ./conf/core-site.xml:/opt/hive/conf/core-site.xml
      - ./lib/postgresql-42.6.0.jar:/opt/hive/lib/postgresql-42.6.0.jar:ro
      - ./lib/hadoop-aws-3.3.4.jar:/opt/hive/lib/hadoop-aws-3.3.4.jar:ro
      - ./lib/aws-java-sdk-bundle-1.12.262.jar:/opt/hive/lib/aws-java-sdk-bundle-1.12.262.jar:ro
    ports:
      - "${LHAQE_HIVE_METASTORE_PORT:-19083}:9083"
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9083 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10

  # ─────────────────────────────────────────────
  # SPARK
  # ─────────────────────────────────────────────
  spark-master:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: lhaqe-spark-master
    hostname: spark-master
    networks: [lakehouse-net]
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    volumes:
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./lib:/opt/spark/extra-jars:ro
      - ./metrics:/opt/spark/metrics
    ports:
      - "${LHAQE_SPARK_MASTER_UI_PORT:-18080}:8080"
      - "${LHAQE_SPARK_MASTER_PORT:-17077}:7077"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  spark-worker-1:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: lhaqe-spark-worker-1
    hostname: spark-worker-1
    networks: [lakehouse-net]
    depends_on:
      spark-master:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - "2500m"
      - spark://spark-master:7077
    volumes:
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./lib:/opt/spark/extra-jars:ro

  spark-worker-2:
    image: apache/spark:3.5.1-scala2.12-java17-python3-ubuntu
    container_name: lhaqe-spark-worker-2
    hostname: spark-worker-2
    networks: [lakehouse-net]
    depends_on:
      spark-master:
        condition: service_healthy
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - --cores
      - "2"
      - --memory
      - "2500m"
      - spark://spark-master:7077
    volumes:
      - ./conf/spark-defaults.conf:/opt/spark/conf/spark-defaults.conf
      - ./conf/core-site.xml:/opt/spark/conf/core-site.xml
      - ./lib:/opt/spark/extra-jars:ro

  # ─────────────────────────────────────────────
  # TRINO (query engine — Gold/Silver)
  # ─────────────────────────────────────────────
  trino:
    image: trinodb/trino:435
    container_name: lhaqe-trino
    hostname: trino
    networks: [lakehouse-net]
    depends_on:
      hive-metastore:
        condition: service_started
      minio:
        condition: service_healthy
    volumes:
      - ./trino/etc:/etc/trino
    ports:
      - "${LHAQE_TRINO_PORT:-18088}:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/v1/info >/dev/null"]
      interval: 15s
      timeout: 10s
      retries: 15
      start_period: 60s

  # ─────────────────────────────────────────────
  # AIRFLOW
  # ─────────────────────────────────────────────
  airflow-init:
    build: ./airflow
    container_name: lhaqe-airflow-init
    user: "0:0"
    networks: [lakehouse-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *airflow-common-env
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts:ro
      - ./data/staging:/opt/airflow/data/staging:ro
      - ./metrics:/opt/airflow/metrics
    entrypoint: >
      /bin/bash -c "
        mkdir -p /opt/airflow/metrics &&
        chmod 1777 /opt/airflow/metrics &&
        chown -R 50000:0 /opt/airflow/metrics &&
        su -s /bin/bash airflow -c 'airflow db init' &&
        su -s /bin/bash airflow -c 'airflow users create --username airflow --password airflow --firstname Air --lastname Flow --role Admin --email airflow@lakehouse.local' || true;
        echo 'Airflow DB initialized';
      "
    restart: "no"

  airflow-webserver:
    build: ./airflow
    container_name: lhaqe-airflow-webserver
    hostname: airflow-webserver
    networks: [lakehouse-net]
    depends_on:
      postgres:
        condition: service_healthy
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    environment:
      <<: *airflow-common-env
      AIRFLOW__WEBSERVER__EXPOSE_CONFIG: "true"
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts:ro
      - ./data/staging:/opt/airflow/data/staging:ro
      - ./metrics:/opt/airflow/metrics
    ports:
      - "${LHAQE_AIRFLOW_WEB_PORT:-18681}:8080"
    healthcheck:
      test: ["CMD", "curl", "--fail", "http://localhost:8080/health"]
      interval: 20s
      timeout: 10s
      retries: 10
      start_period: 60s

  airflow-scheduler:
    build: ./airflow
    container_name: lhaqe-airflow-scheduler
    hostname: airflow-scheduler
    networks: [lakehouse-net]
    depends_on:
      airflow-webserver:
        condition: service_healthy
    command: scheduler
    environment:
      <<: *airflow-common-env
    volumes:
      - ./scripts/dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts:ro
      - ./data/staging:/opt/airflow/data/staging:ro
      - ./metrics:/opt/airflow/metrics

  # ─────────────────────────────────────────────
  # APACHE SUPERSET (dashboard BI)
  # ─────────────────────────────────────────────
  superset-init:
    build: ./superset
    container_name: lhaqe-superset-init
    networks: [lakehouse-net]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SUPERSET_SECRET_KEY: "${LHAQE_SUPERSET_SECRET_KEY:-lakehouse_superset_secret_change_me}"
      DATABASE_URL: postgresql+psycopg2://admin:admin123@postgres:5432/superset_db
    volumes:
      - superset-home:/app/superset_home
    command: >
      /bin/sh -c "
        superset db upgrade &&
        superset fab create-admin --username admin --firstname Admin --lastname User --email admin@lakehouse.local --password admin || true &&
        superset init &&
        echo 'Superset initialized';
      "
    restart: "no"

  superset:
    build: ./superset
    container_name: lhaqe-superset
    hostname: superset
    networks: [lakehouse-net]
    depends_on:
      superset-init:
        condition: service_completed_successfully
      trino:
        condition: service_started
    environment:
      SUPERSET_SECRET_KEY: "${LHAQE_SUPERSET_SECRET_KEY:-lakehouse_superset_secret_change_me}"
      DATABASE_URL: postgresql+psycopg2://admin:admin123@postgres:5432/superset_db
    volumes:
      - superset-home:/app/superset_home
    ports:
      - "${LHAQE_SUPERSET_PORT:-18089}:8088"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8088/health"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 90s

  # ─────────────────────────────────────────────
  # PROMETHEUS + GRAFANA (monitoring AQE)
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: lhaqe-prometheus
    hostname: prometheus
    networks: [lakehouse-net]
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "${LHAQE_PROMETHEUS_PORT:-19090}:9090"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  metrics-exporter:
    image: python:3.11-slim
    container_name: lhaqe-metrics-exporter
    hostname: metrics-exporter
    networks: [lakehouse-net]
    command:
      - python
      - /app/scripts/benchmark/metrics_exporter.py
      - --host
      - "0.0.0.0"
      - --port
      - "9101"
      - --metrics-dir
      - /metrics
    environment:
      AQE_METRICS_DIR: /metrics
    volumes:
      - ./metrics:/metrics
      - ./scripts:/app/scripts:ro
    ports:
      - "${LHAQE_METRICS_EXPORTER_PORT:-9101}:9101"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:9101/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.0.0
    container_name: lhaqe-grafana
    hostname: grafana
    networks: [lakehouse-net]
    depends_on:
      prometheus:
        condition: service_healthy
      metrics-exporter:
        condition: service_healthy
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: "${LHAQE_GRAFANA_PASSWORD:-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_INSTALL_PLUGINS: ""
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "${LHAQE_GRAFANA_PORT:-13001}:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # ─────────────────────────────────────────────
  # JUPYTER (eksplorasi PySpark)
  # ─────────────────────────────────────────────
  jupyter:
    image: jupyter/pyspark-notebook:latest
    container_name: lhaqe-jupyter
    hostname: jupyter
    networks: [lakehouse-net]
    depends_on:
      spark-master:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      JUPYTER_ENABLE_LAB: "yes"
      JUPYTER_TOKEN: "lakehouse"
      SPARK_MASTER: spark://spark-master:7077
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin123
      AWS_REGION: us-east-1
      PYSPARK_SUBMIT_ARGS: >-
        --packages
        org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4,com.amazonaws:aws-java-sdk-bundle:1.12.262
        pyspark-shell
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./scripts/dags:/home/jovyan/dags
      - ./conf/spark-defaults.conf:/usr/local/spark/conf/spark-defaults.conf:ro
      - ./conf/core-site.xml:/usr/local/spark/conf/core-site.xml:ro
    ports:
      - "${LHAQE_JUPYTER_PORT:-18888}:8888"
